<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>元 - 森林的孩子</title>
<style>
body{font-family:"Microsoft YaHei",sans-serif;max-width:800px;margin:0 auto;padding:20px;background:#f5f5f5}
.card{background:white;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h1{color:#2e7d32}
h2{color:#388e3c;border-bottom:2px solid #4caf50;padding-bottom:8px}
.meta{color:#666;font-size:14px}
.poem{white-space:pre-line;line-height:2;font-size:16px;color:#333}
.tag{display:inline-block;background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:16px;margin:4px;font-size:14px}
</style>
</head>
<body>
<div class="card">
<h1>元</h1>
<p class="meta">第148篇 - 森林的孩子故事诗</p>
</div>
<div class="card">
<h2>原文</h2>
<div class="poem">元
一元
复始
万象更新

新
的
开始</div>
</div>
<div class="card">
<h2>故事概述</h2>
<p>一首关于'元'的童话诗，描绘了7行诗意场景。</p>
<div>
<span class="tag">故事诗</span>
<span class="tag">第三人称</span>
<span class="tag">纯真、美好</span>
</div>
</div>
<div class="card">
<h2>人物</h2>
<p><strong>你（叙述对象/主角）</strong> - 主角<br>
<small>纯真, 善良, 充满想象力</small></p>
<p><strong>自然万物</strong> - 环境/助力者<br>
<small>有灵性, 美好</small></p>

</div>
<div class="card">
<h2>价值观</h2>
<p>主题: 纯真, 自然, 美好</p>
<p>寓意: 珍惜自然, 保持童真, 拥抱美好</p>
</div>
</body>
</html>
